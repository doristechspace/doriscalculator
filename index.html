<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-container">
        <h1 class="creator-title">Created by somiee</h1>
        <div class="calculator">
            <div class="display">
                <div class="previous-operand" data-previous-operand></div>
                <div class="current-operand" data-current-operand>0</div>
            </div>
            
            <div class="keypad">
                <button class="btn btn-action" data-all-clear>AC</button>
                <button class="btn btn-action" data-delete>DEL</button>
                <button class="btn btn-action" data-operation>%</button>
                <button class="btn btn-operator" data-operation>÷</button>
                
                <button class="btn" data-number>7</button>
                <button class="btn" data-number>8</button>
                <button class="btn" data-number>9</button>
                <button class="btn btn-operator" data-operation>×</button>
                
                <button class="btn" data-number>4</button>
                <button class="btn" data-number>5</button>
                <button class="btn" data-number>6</button>
                <button class="btn btn-operator" data-operation>-</button>
                
                <button class="btn" data-number>1</button>
                <button class="btn" data-number>2</button>
                <button class="btn" data-number>3</button>
                <button class="btn btn-operator" data-operation>+</button>
                
                <button class="btn btn-zero" data-number>0</button>
                <button class="btn" data-number>.</button>
                <button class="btn btn-equals" data-equals>=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
